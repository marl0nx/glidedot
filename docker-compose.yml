services:
  backend:
    image: ghcr.io/marl0nx/glidedot-backend:latest
    container_name: glide-backend
    ports:
      - "3001:3001"
    volumes:
      - glide_data:/app/data
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_URL=data/db.sqlite
      # DeepL (Optional)
      - DEEPL_API_KEY=${DEEPL_API_KEY:-}
      - DEEPL_API_URL=${DEEPL_API_URL:-https://api-free.deepl.com/v2}
      # S3 Backups (Optional)
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    restart: unless-stopped

  frontend:
    image: ghcr.io/marl0nx/glidedot-frontend:latest
    container_name: glide-frontend
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      # Base URL to the backend API (must be accessible from the user's browser)
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api}
      # OIDC Configuration
      - NUXT_PUBLIC_OIDC_ENABLED=${NUXT_OIDC_CLIENT_ID:+true}
      - NUXT_OIDC_PROVIDERS_OIDC_CLIENT_ID=${NUXT_OIDC_CLIENT_ID:-}
      - NUXT_OIDC_PROVIDERS_OIDC_CLIENT_SECRET=${NUXT_OIDC_CLIENT_SECRET:-}
      - NUXT_OIDC_PROVIDERS_OIDC_AUTHORIZATION_URL=${NUXT_OIDC_AUTHORIZATION_URL:-}
      - NUXT_OIDC_PROVIDERS_OIDC_TOKEN_URL=${NUXT_OIDC_TOKEN_URL:-}
      - NUXT_OIDC_PROVIDERS_OIDC_REDIRECT_URI=${NUXT_OIDC_REDIRECT_URI:-}
      - NUXT_OIDC_PROVIDERS_OIDC_USER_INFO_URL=${NUXT_OIDC_PROVIDERS_OIDC_USER_INFO_URL:-}
      # OIDC Secrets
      - NUXT_OIDC_SESSION_SECRET=${NUXT_OIDC_SESSION_SECRET:-supersecret_session_key}
      - NUXT_OIDC_TOKEN_KEY=${NUXT_OIDC_TOKEN_KEY:-}
      - NUXT_OIDC_AUTH_SESSION_SECRET=${NUXT_OIDC_AUTH_SESSION_SECRET:-supersecret_auth_key}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  glide_data:
